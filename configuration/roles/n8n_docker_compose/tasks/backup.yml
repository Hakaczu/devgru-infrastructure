---
- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ n8n_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: n8n_backup_enabled | bool

- name: Deploy n8n backup script
  ansible.builtin.template:
    src: n8n_backup.sh.j2
    dest: /usr/local/bin/n8n_backup
    owner: root
    group: root
    mode: "0755"
  when: n8n_backup_enabled | bool

- name: Configure n8n backup cron job
  ansible.builtin.cron:
    name: n8n backup
    minute: "{{ 59 | random(seed=inventory_hostname) }}"
    hour: "4"
    job: /usr/local/bin/n8n_backup >> /var/log/n8n_backup.log 2>&1
    state: "{{ 'present' if n8n_backup_enabled | bool else 'absent' }}"
