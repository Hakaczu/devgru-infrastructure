---
- name: Ensure n8n data directory exists
  ansible.builtin.file:
    path: "{{ n8n_data_dir }}"
    state: directory
    owner: "1000"
    group: root
    mode: "0755"

- name: Ensure postgres data directory exists
  ansible.builtin.file:
    path: "{{ n8n_pg_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure compose directory exists
  ansible.builtin.file:
    path: "{{ n8n_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart n8n stack

- name: Start n8n stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ n8n_compose_dir }}"
  changed_when: false
