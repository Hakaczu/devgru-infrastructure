---
- name: System maintenance tasks
  ansible.builtin.import_tasks: upgrade.yml
  tags:
    - system_maintenance

- name: Deploy Adeptus Mechanicus MOTD
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
  notify: Update motd
  tags:
    - motd
    - common

- name: Ensure dotfiles directory exists in /opt
  ansible.builtin.file:
    path: /opt/devgru/dotfiles
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - common
