---
hyperv_vm_allow_destroy: false

# Definition fragments are loaded from domain/application catalogs.
hyperv_vm_definition_dir: "{{ playbook_dir }}/../group_vars/hyperv_hosts/vms.d"
hyperv_vm_switch_definition_dir: "{{ playbook_dir }}/../group_vars/hyperv_hosts/switches.d"

# PowerShell executor modules are copied from the provisioning library to the Hyper-V host.
hyperv_vm_module_source_dir: "{{ playbook_dir }}/../../../modules/hyperv"
hyperv_vm_module_target_dir: "{{ hyperv_host_temp_dir }}\\HyperVModules"

# Optional ISO behavior: for new VM creation, set ISO as first boot device (Gen2 only).
hyperv_vm_iso_boot_on_create: true

# SCSI mapping limits used for deterministic disk placement.
hyperv_vm_max_scsi_controllers: 4
hyperv_vm_max_scsi_locations_per_controller: 64
