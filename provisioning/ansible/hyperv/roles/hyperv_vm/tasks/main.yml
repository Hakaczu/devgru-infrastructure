---
- name: Load domain definition fragments
  ansible.builtin.import_tasks: load_definitions.yml

- name: Validate merged Hyper-V definitions
  ansible.builtin.import_tasks: validate.yml

- name: Copy Hyper-V executor modules to host
  ansible.builtin.import_tasks: sync_modules.yml

- name: Ensure Hyper-V switches
  ansible.builtin.import_tasks: execute_switches.yml

- name: Ensure Hyper-V virtual machines
  ansible.builtin.import_tasks: execute_vms.yml
